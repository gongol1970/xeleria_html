<!doctype html><html><head><meta charset="utf-8"><title>XelerIA Test</title><style>body{font-family:Arial;background:#0b1220;color:white;padding:20px}input,button{padding:9px;margin:4px}.box{border:1px solid #345;padding:12px;margin:10px 0;border-radius:10px}pre{white-space:pre-wrap;background:#111;padding:10px}</style></head><body><h1>XelerIA test</h1><div class="box"><button id="btnPing">Ping</button> <button id="btnStock">Ver stock</button> <button id="btnActivity">Actividad</button></div><div class="box"><h3>Producto</h3><input id="pSku" placeholder="SKU"><input id="pName" placeholder="Nombre"><input id="pStock" value="10"><button id="btnProduct">Guardar producto</button></div><div class="box"><h3>Venta</h3><input id="vSku" placeholder="SKU"><input id="vQty" value="1"><input id="vPrice" value="1000"><button id="btnSale">Vender</button></div><div class="box"><h3>Detalle de orden</h3><input id="oId" placeholder="ID orden" size="45"><button id="btnOrder">Ver orden</button></div><pre id="out">listo</pre><script>const API='https://api.xeleria.com.ar';const TEN='fbfa89c2-b377-49b3-9d18-d7d313c01db1';const $=id=>document.getElementById(id);function show(x){$('out').textContent=typeof x==='string'?x:JSON.stringify(x,null,2)}async function call(path,opt){show('llamando '+path);let r=await fetch(API+path,opt||{});let t=await r.text();let d;try{d=JSON.parse(t)}catch(e){d={raw:t}}d.status=r.status;d.ok=r.ok;show(d);return d}$('btnPing').onclick=()=>call('/health');$('btnStock').onclick=()=>call('/api/stock-view/'+TEN);$('btnActivity').onclick=()=>call('/api/activity/'+TEN);$('btnOrder').onclick=()=>call('/api/orders/'+TEN+'/'+encodeURIComponent($('oId').value)+'/detail');$('btnProduct').onclick=async()=>{let b={sku:$('pSku').value,name:$('pName').value,stock:Number($('pStock').value||0),item_type:'simple',active:true};let d=await call('/api/inventory/'+TEN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});if(d.status===409)d=await call('/api/inventory/'+TEN+'/'+encodeURIComponent(b.sku),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});if(d.ok){$('pSku').value='';$('pName').value='';$('pStock').value='10'}};$('btnSale').onclick=async()=>{let b={channel:'LOCAL',lines:[{sku:$('vSku').value,quantity:Number($('vQty').value||1),unit_price:Number($('vPrice').value||0)}]};let d=await call('/api/sales/'+TEN+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});if(d.ok){$('vSku').value='';$('vQty').value='1';$('vPrice').value='1000'}};</script></body></html>
