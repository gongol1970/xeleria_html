name: Apply Oxanium brand once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply Oxanium to XelerIA brand name
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('admin_erp.html')
          text = path.read_text(encoding='utf-8')

          marker = '<!-- XELERIA_OXANIUM_BRAND_V283 -->'
          if marker not in text:
              anchor = '<!-- XELERIA_LOGOS_ALIGNED_V282 -->'
              if anchor not in text:
                  raise SystemExit('Brand marker anchor not found')
              text = text.replace(anchor, marker + '\n' + anchor, 1)

          import_rule = "@import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@600&display=swap');"
          if import_rule not in text:
              text = text.replace('<style>', '<style>\n' + import_rule, 1)

          css_rule = ".brandName{font-family:'Oxanium',Inter,Arial,sans-serif!important;font-weight:600!important;letter-spacing:.01em!important}"
          if css_rule not in text:
              text = text.replace('</style>', css_rule + '\n</style>', 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit change
        run: |
          if git diff --quiet -- admin_erp.html; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_erp.html
          git commit -m "Use Oxanium for XelerIA brand name"
          git push