name: Debug invoice function once
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text=Path('admin_erp.html').read_text(encoding='utf-8')
          p=text.find('function invoiceButton')
          out=['position='+str(p), 'marker='+str('XELERIA_DELIVERED_INVOICE_ACTION_V284' in text)]
          if p>=0: out.append(text[p:p+2200])
          Path('_tmp_invoice_frontend_debug.txt').write_text('\n'.join(out),encoding='utf-8')
          PY
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _tmp_invoice_frontend_debug.txt
          git commit -m "Add temporary invoice frontend debug report"
          git push