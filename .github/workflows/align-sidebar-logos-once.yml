name: Align sidebar logos once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Align XelerIA and tenant logos
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('admin_erp.html')
          text = path.read_text(encoding='utf-8')

          marker = '<!-- XELERIA_LOGOS_ALIGNED_V282 -->'
          if marker not in text:
              anchor = '<!-- XELERIA_LOGOUT_COMPACT_MOVEMENTS_CLEAN_V281 -->'
              if anchor not in text:
                  raise SystemExit('Header marker anchor not found')
              text = text.replace(anchor, marker + '\n' + anchor, 1)

          desktop_old = '.brandTenantStack{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;width:60px;min-width:60px}'
          desktop_new = '.brandTenantStack{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;width:60px;min-width:60px;transform:translateY(12px)}'
          if desktop_new not in text:
              if desktop_old not in text:
                  raise SystemExit('Desktop tenant stack rule not found')
              text = text.replace(desktop_old, desktop_new, 1)

          mobile_old = '.brandTenantStack{width:48px!important;min-width:48px!important}'
          mobile_new = '.brandTenantStack{width:48px!important;min-width:48px!important;transform:translateY(11px)!important}'
          if mobile_new not in text:
              if mobile_old not in text:
                  raise SystemExit('Mobile tenant stack rule not found')
              text = text.replace(mobile_old, mobile_new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit change
        run: |
          if git diff --quiet -- admin_erp.html; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_erp.html
          git commit -m "Align sidebar logos"
          git push
