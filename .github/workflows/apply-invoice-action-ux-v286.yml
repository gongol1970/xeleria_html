name: Improve invoice action UX
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch UI
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('admin_erp.html')
          t=p.read_text(encoding='utf-8')

          marker='<!-- XELERIA_INVOICE_ACTION_UX_V286 -->'
          anchor='<!-- XELERIA_INVOICE_WARNING_MENU_V285 -->'
          if marker not in t:
              if anchor not in t:
                  raise SystemExit('V285 marker not found')
              t=t.replace(anchor,anchor+'\n'+marker,1)

          old_css="""/* XELERIA_INVOICE_WARNING_MENU_V285 */
          .invoiceKebab[open]{display:inline-grid!important;justify-items:end!important;gap:6px!important}
          .invoiceKebab[open] .kebabPanel{position:static!important;right:auto!important;left:auto!important;top:auto!important;bottom:auto!important;z-index:auto!important;min-width:108px!important;padding:4px!important;box-shadow:none!important;border-radius:10px!important}
          .invoiceKebab[open] .kebabPanel button{min-width:100px!important;width:100%!important;justify-content:center!important;padding:7px 10px!important}
          """
          new_css="""/* XELERIA_INVOICE_WARNING_MENU_V285 */
          .invoiceKebab{position:relative!important}
          .invoiceKebab[open]{display:inline-block!important}
          .invoiceKebab[open] .kebabPanel{position:fixed!important;right:auto!important;top:auto!important;bottom:auto!important;z-index:99999!important;min-width:116px!important;padding:5px!important;border-radius:10px!important}
          .invoiceKebab[open] .kebabPanel button{min-width:104px!important;width:100%!important;justify-content:center!important;padding:7px 10px!important}
          """
          if old_css not in t:
              raise SystemExit('V285 CSS block not found')
          t=t.replace(old_css,new_css,1)

          old_button="""return `<div class="invoiceMiniWrap"><details class="kebabMenu invoiceKebab"><summary class="invoiceStatusIcon draft" title="Pendiente de facturación">📄⚠️</summary><div class="kebabPanel"><button onclick="issueInvoiceFromSale('${jsq(ch)}','${jsq(oid)}')">Facturar</button></div></details></div>`;"""
          new_button="""return `<div class="invoiceMiniWrap" data-invoice-channel="${esc(String(ch||'').toUpperCase())}" data-invoice-order="${esc(String(oid))}"><details class="kebabMenu invoiceKebab" ontoggle="positionInvoiceMenu(this)"><summary class="invoiceStatusIcon draft" title="Pendiente de facturación">📄⚠️</summary><div class="kebabPanel"><button onclick="this.closest('details').open=false;issueInvoiceFromSale('${jsq(ch)}','${jsq(oid)}')">Facturar</button></div></details></div>`;"""
          if old_button not in t:
              raise SystemExit('invoice button template not found')
          t=t.replace(old_button,new_button,1)

          insert_anchor="""}
          function isTnMotoShipping(o){"""
          helper="""}
          function positionInvoiceMenu(details){
            let panel=details?.querySelector('.kebabPanel');
            let summary=details?.querySelector('summary');
            if(!panel||!summary)return;
            if(!details.open){panel.style.left='';panel.style.top='';return}
            requestAnimationFrame(()=>{
              let r=summary.getBoundingClientRect();
              let w=panel.offsetWidth||116;
              let h=panel.offsetHeight||44;
              let left=Math.max(8,Math.min(window.innerWidth-w-8,r.right-w));
              let top=r.bottom+6;
              if(top+h>window.innerHeight-8)top=Math.max(8,r.top-h-6);
              panel.style.left=left+'px';
              panel.style.top=top+'px';
            });
          }
          function removeInvoiceAction(ch,orderId){
            let channel=String(ch||'').toUpperCase();
            let oid=String(orderId||'');
            document.querySelectorAll('.invoiceMiniWrap').forEach(el=>{
              if(String(el.dataset.invoiceChannel||'').toUpperCase()===channel&&String(el.dataset.invoiceOrder||'')===oid)el.remove();
            });
          }
          function isTnMotoShipping(o){"""
          if insert_anchor not in t:
              raise SystemExit('helper insertion anchor not found')
          t=t.replace(insert_anchor,helper,1)

          old_confirm=r"""let ok=confirm(`Emitir comprobante REAL en ARCA para ${ch} ${orderId}?\n\nRevisá que el preview/borrador tenga receptor fiscal e importe correctos antes de aceptar.`);"""
          new_confirm=r"""let ok=confirm(`¿Emitir factura REAL en ARCA para ${ch} ${orderId}?\n\nSe generará el CAE y, si es Mercado Libre, el PDF se adjuntará automáticamente a la venta. Si luego la operación se cancela, será necesario emitir una nota de crédito.`);"""
          if old_confirm not in t:
              raise SystemExit('confirmation text not found')
          t=t.replace(old_confirm,new_confirm,1)

          old_success="""    let extra='';
              if(String(ch).toUpperCase()==='ML'){
                if(ml.ok&&ml.already_uploaded)extra=' · ML ya tenía factura';
                else if(ml.ok)extra=' · PDF subido a ML';
                else if(ml.skipped)extra=' · ML pendiente';
              }
              setArcaAndSalesStatus(ch,`Emitida OK: ${inv.cbte_letra||''} ${String(inv.pto_vta||'').padStart(4,'0')}-${String(inv.cbte_nro||'').padStart(8,'0')} · CAE ${inv.cae||''}${extra}`,true);
              await loadArcaInvoices();
              loadRecent(ch,state.sales[ch]?.offset||0);"""
          new_success=r"""    let extra='';
              let channelUploadMsg='';
              if(String(ch).toUpperCase()==='ML'){
                if(ml.ok&&ml.already_uploaded){extra=' · ML ya tenía factura';channelUploadMsg='El PDF ya estaba cargado en Mercado Libre.'}
                else if(ml.ok){extra=' · PDF subido a ML';channelUploadMsg='El PDF fue subido correctamente a Mercado Libre.'}
                else if(ml.skipped){extra=' · ML pendiente';channelUploadMsg='La factura fue emitida, pero el PDF quedó pendiente en Mercado Libre: '+String(ml.reason||'sin detalle')}
                else{extra=' · revisar carga en ML';channelUploadMsg='La factura fue emitida, pero Mercado Libre no confirmó la carga del PDF: '+String(ml.error||ml.reason||ml.status_code||'sin detalle')}
              }
              let number=`${inv.cbte_letra||''} ${String(inv.pto_vta||'').padStart(4,'0')}-${String(inv.cbte_nro||'').padStart(8,'0')}`.trim();
              setArcaAndSalesStatus(ch,`Emitida OK: ${number} · CAE ${inv.cae||''}${extra}`,true);
              if(inv.cae)removeInvoiceAction(ch,orderId);
              await loadArcaInvoices();
              await loadRecent(ch,state.sales[ch]?.offset||0);
              alert(`Factura emitida correctamente.\n\nComprobante: ${number}\nCAE: ${inv.cae||'-'}${channelUploadMsg?'\n\n'+channelUploadMsg:''}`);"""
          if old_success not in t:
              raise SystemExit('success block not found')
          t=t.replace(old_success,new_success,1)

          p.write_text(t,encoding='utf-8')
          PY
      - name: Validate
        run: |
          grep -q 'XELERIA_INVOICE_ACTION_UX_V286' admin_erp.html
          grep -q 'positionInvoiceMenu' admin_erp.html
          grep -q 'Factura emitida correctamente' admin_erp.html
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_erp.html
          git commit -m "Improve invoice action feedback and floating menu" || exit 0
          git push