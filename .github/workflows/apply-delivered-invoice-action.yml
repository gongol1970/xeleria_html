name: Apply delivered invoice action once
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show invoice action only for delivered sales
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('admin_erp.html')
          text = path.read_text(encoding='utf-8')
          marker = '<!-- XELERIA_DELIVERED_INVOICE_ACTION_V284 -->'
          if marker not in text:
              anchor = '<!-- XELERIA_OXANIUM_BRAND_V283 -->'
              if anchor not in text:
                  raise SystemExit('Header anchor not found')
              text = text.replace(anchor, marker + '\n' + anchor, 1)

          old = '''function invoiceButton(o,ch){
  // ARCA_FINAL_CLEANUP_V15
  // Vista compacta: en Ventas alcanza con icono. El detalle queda para ARCA reportes.
  let invId=o.invoice_id||o.arca_invoice_id||'';
  let st=String(o.invoice_status||o.arca_status||'').toLowerCase();
  let hasCae=!!(o.invoice_cae||o.cae||o.arca_cae);
  if(hasCae||st==='issued'){
    let icon='<span class="invoiceStatusIcon issued" title="Facturada">📄</span>';
    return `<div class="invoiceMiniWrap">${invId?`<a target="_blank" href="${url('/admin/arca/facturas/'+encodeURIComponent(invId)+'/pdf')}">${icon}</a>`:icon}</div>`;
  }
  if(st==='draft'||st==='pending_to_invoice'||st==='pending'){
    return `<div class="invoiceMiniWrap"><span class="invoiceStatusIcon draft" title="Pendiente para facturar">📄⚠️</span></div>`;
  }
  return `<div class="invoiceMiniWrap"><span class="invoiceStatusIcon none" title="Sin factura">📄⚠️</span></div>`;
}'''
          new = '''function invoiceButton(o,ch){
  // Sólo ventas entregadas y todavía no facturadas muestran la acción.
  // Sin icono significa: ya facturada o todavía no corresponde facturar.
  let st=String(o.invoice_status||o.arca_status||'').toLowerCase();
  let hasCae=!!(o.invoice_cae||o.cae||o.arca_cae);
  if(hasCae||st==='issued')return '';

  let delivered=String(shippingStateLabel(o,ch)||'').trim().toLowerCase()==='entregado';
  if(!delivered)return '';

  let oid=invoiceOrderId(o,ch);
  if(!oid)return '';

  return `<div class="invoiceMiniWrap"><details class="kebabMenu invoiceKebab"><summary class="invoiceStatusIcon draft" title="Pendiente de facturación">📄⚠️</summary><div class="kebabPanel"><button onclick="issueInvoiceFromSale('${jsq(ch)}','${jsq(oid)}')">Facturar</button></div></details></div>`;
}'''
          if new not in text:
              if old not in text:
                  raise SystemExit('Exact invoiceButton target not found')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit change
        run: |
          if git diff --quiet -- admin_erp.html; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_erp.html
          git commit -m "Show invoice action only on delivered sales"
          git push