name: One-time patch inventory CSV download

on:
  push:
    paths:
      - '.github/workflows/patch-download-csv-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch admin_erp.html downloadInventoryCsv
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('admin_erp.html')
          text = path.read_text(encoding='utf-8')

          new_fn = r'''async function downloadInventoryCsv(){
  setStatus('invStatus','Preparando planilla...');
  var saveHandle=null;
  var popup=null;
  try{
    // Chrome bloquea descargas automáticas cuando el CSV se baja con anchor.click().
    // showSaveFilePicker nace de la acción directa del usuario y evita ese permiso raro.
    if(window.showSaveFilePicker){
      try{
        saveHandle=await window.showSaveFilePicker({
          suggestedName:'inventario_xeleria.csv',
          types:[{description:'CSV',accept:{'text/csv':['.csv']}}]
        });
      }catch(pickErr){
        if(pickErr&&pickErr.name==='AbortError'){
          setStatus('invStatus','Descarga cancelada.',false);
          return;
        }
        throw pickErr;
      }
    }else{
      // Fallback: abrir pestaña dentro del click del usuario. Después se apunta al blob.
      try{
        popup=window.open('about:blank','_blank');
        if(popup){
          popup.document.write('<!doctype html><title>Inventario XelerIA</title><body style="font-family:Arial;padding:24px">Preparando planilla...</body>');
          popup.document.close();
        }
      }catch(_e){}
    }

    var h=xeleriaHeaders();
    delete h['Content-Type'];
    var r=await fetch(url('/admin/v2/inventory/products/export'),{method:'GET',headers:h,cache:'no-store'});
    var txt='';
    if(!r.ok){
      try{txt=await r.text()}catch(_e){}
      throw {http_status:r.status,http_status_text:r.statusText,raw_text:txt,detail:txt};
    }
    var blob=await r.blob();
    var filename=filenameFromContentDisposition(r.headers.get('content-disposition'))||'inventario_xeleria.csv';

    if(saveHandle){
      var writable=await saveHandle.createWritable();
      await writable.write(blob);
      await writable.close();
      setStatus('invStatus','Planilla guardada.',true);
      return;
    }

    var obj=URL.createObjectURL(blob);
    if(popup&&!popup.closed){
      popup.location.href=obj;
      setTimeout(function(){URL.revokeObjectURL(obj)},60000);
      setStatus('invStatus','Planilla abierta en una pestaña para guardar/descargar.',true);
      return;
    }

    // Último fallback: no disparar click automático. Mostrar un link manual.
    var host=qs('invStatus');
    if(host){
      host.className='status oktxt';
      host.textContent='Planilla lista. ';
      var a=document.createElement('a');
      a.href=obj;
      a.download=filename;
      a.textContent='Descargar ahora';
      host.appendChild(a);
      setTimeout(function(){URL.revokeObjectURL(obj)},300000);
    }else{
      setStatus('invStatus','Planilla lista.',true);
    }
  }catch(e){
    setStatus('invStatus','Error bajando planilla: '+friendlyInventoryError(e),false);
    try{if(popup&&!popup.closed)popup.close()}catch(_e){}
  }
}
'''

          pattern = r"async function downloadInventoryCsv\(\)\{.*?\n\}function prefKey"
          replacement = new_fn + "function prefKey"
          new_text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'No pude reemplazar downloadInventoryCsv. Reemplazos={count}')

          # Marca mínima para saber desde el HTML que este parche está aplicado.
          new_text = new_text.replace('FRONTEND_BUILD: state.frontendBuild', 'FRONTEND_BUILD: state.frontendBuild')
          path.write_text(new_text, encoding='utf-8')

          Path('.github/workflows/patch-download-csv-trigger.txt').unlink(missing_ok=True)
          Path('.github/workflows/patch-download-csv-once.yml').unlink(missing_ok=True)
          PY
      - name: Commit patched HTML and remove one-time workflow
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin_erp.html .github/workflows/patch-download-csv-trigger.txt .github/workflows/patch-download-csv-once.yml
          git commit -m "Avoid automatic-download block for inventory CSV"
          git push
