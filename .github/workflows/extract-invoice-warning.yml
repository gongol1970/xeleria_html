name: Extract invoice warning UI
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract focused snippets
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          t=Path('admin_erp.html').read_text(encoding='utf-8')
          out=[]
          def add(title,pos,before=800,after=2500):
              out.append(f'=== {title} @ {pos} ===\n'+t[max(0,pos-before):min(len(t),pos+after)])
          for needle in ['async function issueInvoiceFromSale','function issueInvoiceFromSale','function orderCard','return `<div class="orderCard','details.kebabMenu','invoiceMiniWrap','invoiceKebab','kebabMenu[open]']:
              start=0
              while True:
                  pos=t.find(needle,start)
                  if pos<0: break
                  add(needle,pos)
                  start=pos+len(needle)
          for m in re.finditer(r'[^{}]*orderCard[^{}]*\{[^{}]*\}',t):
              add('css orderCard',m.start(),200,1200)
          for m in re.finditer(r'[^{}]*invoiceKebab[^{}]*\{[^{}]*\}',t):
              add('css invoiceKebab',m.start(),200,1200)
          Path('_tmp_invoice_warning_extract.txt').write_text('\n\n'.join(out),encoding='utf-8')
          PY
      - name: Commit extract
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _tmp_invoice_warning_extract.txt
          git commit -m "Extract focused invoice warning UI" || exit 0
          git push