<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XelerIA Panel</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1220;color:#eef4ff;margin:0;padding:24px}
    input,button,select{padding:10px;border-radius:8px;border:1px solid #334;background:#111c30;color:#eef4ff;margin:4px}
    button{cursor:pointer;background:#12324a}button:hover{filter:brightness(1.15)}
    .card{background:#121a2b;border:1px solid #26344f;border-radius:14px;padding:16px;margin:14px 0}
    table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #26344f;padding:8px;text-align:left}
    .muted{color:#8ea0bd}.pill{background:#22324e;border-radius:99px;padding:3px 8px;margin:2px;display:inline-block}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}pre{white-space:pre-wrap;max-height:240px;overflow:auto}
    @media(max-width:900px){.grid{grid-template-columns:1fr}input{max-width:100%}}
  </style>
</head>
<body>
  <h1>XelerIA · Panel beta</h1>
  <div class="muted">Stock unificado ML / TN / manual</div>
  <div class="card">
    <input id="api" value="https://api.xeleria.com.ar" size="32">
    <input id="tenant" value="fbfa89c2-b377-49b3-9d18-d7d313c01db1" size="40">
    <button onclick="loadAll()">Actualizar</button>
  </div>
  <div class="grid">
    <div class="card"><h3>Carga manual</h3><input id="sku" placeholder="SKU"><input id="name" placeholder="Producto"><input id="stock" placeholder="Stock" type="number" value="1"><input id="cost" placeholder="Costo" type="number"><button onclick="createProduct()">Crear/actualizar producto</button></div>
    <div class="card"><h3>Venta manual</h3><input id="saleSku" placeholder="SKU"><input id="qty" placeholder="Cantidad" type="number" value="1"><input id="price" placeholder="Precio unitario" type="number"><input id="customer" placeholder="Cliente"><button onclick="registerSale()">Registrar venta</button></div>
  </div>
  <div class="card"><h3>Canales</h3><button onclick="mlMe()">Probar ML</button><button onclick="mlItems(true)">ML dry-run</button><button onclick="mlItems(false)">ML importar</button><button onclick="tnStore()">Probar TN</button><button onclick="tnItems(true)">TN dry-run</button><button onclick="tnItems(false)">TN importar</button></div>
  <div class="card"><h3>Resumen</h3><pre id="summary">...</pre></div>
  <div class="card">
    <h3>Stock</h3>
    <input id="q" placeholder="Buscar SKU/producto">
    <select id="marketplace"><option value="">Todos</option><option>ML</option><option>TN</option></select>
    <button onclick="loadStock()">Buscar</button>
    <table><thead><tr><th>SKU</th><th>Producto</th><th>Stock</th><th>Canales</th></tr></thead><tbody id="rows"></tbody></table>
  </div>
  <div class="card"><h3>Resultado</h3><pre id="result">—</pre></div>
<script>
function cfg(){return {api:api.value.replace(/\/$/,''),tenant:tenant.value.trim()}}
async function getJson(path){let c=cfg();let r=await fetch(c.api+path);return await r.json()}
async function sendJson(path,method,body){let c=cfg();let opt={method:method};if(body){opt.headers={'Content-Type':'application/json'};opt.body=JSON.stringify(body)}let r=await fetch(c.api+path,opt);let d=await r.json();result.textContent=JSON.stringify(d,null,2);return d}
async function loadSummary(){let c=cfg();let d=await getJson('/api/dashboard/'+c.tenant+'/summary');summary.textContent=JSON.stringify(d,null,2)}
async function loadStock(){let c=cfg();let p=new URLSearchParams();if(q.value)p.set('q',q.value);if(marketplace.value)p.set('marketplace',marketplace.value);let d=await getJson('/api/stock-view/'+c.tenant+'?'+p.toString());rows.innerHTML=(d.items||[]).map(i=>'<tr><td>'+i.sku+'</td><td>'+i.name+'</td><td>'+i.stock+'</td><td>'+((i.channels||[]).map(x=>'<span class="pill">'+x+'</span>').join('')||'<span class="muted">manual</span>')+'</td></tr>').join('') || '<tr><td colspan="4" class="muted">Sin productos</td></tr>'}
async function createProduct(){let c=cfg();let body={sku:sku.value.trim(),name:name.value.trim(),stock:Number(stock.value||0),item_type:'simple',active:true};if(cost.value)body.cost=Number(cost.value);await sendJson('/api/inventory/'+c.tenant,'POST',body);await loadAll()}
async function registerSale(){let c=cfg();let body={channel:'LOCAL',customer_name:customer.value||null,lines:[{sku:saleSku.value.trim(),quantity:Number(qty.value||1),unit_price:price.value?Number(price.value):null}]};await sendJson('/api/sales/'+c.tenant+'/register','POST',body);await loadAll()}
async function mlMe(){let c=cfg();let d=await getJson('/api/reader/'+c.tenant+'/me');result.textContent=JSON.stringify(d,null,2)}
async function mlItems(dry){let c=cfg();await sendJson('/api/reader/'+c.tenant+'/items?limit=20&dry_run='+dry,'POST');await loadAll()}
async function tnStore(){let c=cfg();let d=await getJson('/api/tn-reader/'+c.tenant+'/store');result.textContent=JSON.stringify(d,null,2)}
async function tnItems(dry){let c=cfg();await sendJson('/api/tn-reader/'+c.tenant+'/products?per_page=20&dry_run='+dry,'POST');await loadAll()}
async function loadAll(){await loadSummary();await loadStock()}
loadAll()
</script>
</body>
</html>
