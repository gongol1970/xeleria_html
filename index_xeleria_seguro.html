<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>XelerIA · Panel</title>
  <link rel="icon" type="image/svg+xml" href="./favicon_xeleria.svg?v=20260706">
  <link rel="alternate icon" type="image/png" href="./favicon_xeleria.png?v=20260620">
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5f0e8;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
    .boot{display:grid;place-items:center;width:100%;height:100%;color:#3b352c;font-weight:800;text-align:center}
    .boot small{display:block;margin-top:8px;font-weight:600;color:#7b6d5c}
    iframe{position:fixed;inset:0;width:100%;height:100%;border:0}
  </style>
</head>
<body>
  <div id="boot" class="boot"><div>Abriendo XelerIA<small>Validando sesión...</small></div></div>
  <script>
  (async function(){
    const API='https://api.xeleria.com.ar';
    const q=(location.search||'')+(location.hash||'');
    const params=new URLSearchParams(location.search||'');
    function clearSession(){
      try{
        localStorage.removeItem('xeleria_session_token');
        sessionStorage.removeItem('xeleria_session_token');
      }catch(e){}
    }
    function goInicio(reason){
      const p=new URLSearchParams();
      if(reason)p.set('reason',reason);
      location.replace('./inicio.html'+(p.toString()?('?'+p.toString()):''));
    }
    if(params.has('logout')||params.has('reset')){
      clearSession();
      goInicio(params.get('reason')||'logout');
      return;
    }
    let token='';
    try{token=localStorage.getItem('xeleria_session_token')||sessionStorage.getItem('xeleria_session_token')||'';}catch(e){}
    if(!token){goInicio('sin_sesion');return;}
    try{
      const r=await fetch(API+'/auth/me',{headers:{'x-session-token':token},cache:'no-store'});
      if(!r.ok)throw new Error('session_invalid');
      const d=await r.json().catch(()=>({}));
      if(!d||d.ok!==true)throw new Error('session_invalid');
      document.getElementById('boot').remove();
      const iframe=document.createElement('iframe');
      iframe.id='xeleriaPanel';
      iframe.title='XelerIA';
      iframe.src='./admin_erp.html'+q;
      document.body.appendChild(iframe);
    }catch(e){
      clearSession();
      goInicio('session_expired');
    }
  })();
  </script>
</body>
</html>
