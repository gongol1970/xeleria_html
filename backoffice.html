<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XelerIA · Backoffice</title>
<link rel="icon" href="./favicon_xeleria.png?v=20260620" />
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f2f0eb;font-family:Inter,Arial,sans-serif}
#xeFrame{border:0;width:100%;height:100vh;display:block;background:#f2f0eb}
#xeBoot{position:fixed;inset:auto 18px 18px auto;background:#111;color:#dcc58f;border:1px solid rgba(220,197,143,.5);border-radius:14px;padding:10px 12px;font-size:12px;z-index:9999;box-shadow:0 10px 28px rgba(0,0,0,.25)}
</style>
<script src="./backoffice_runtime_patch.js?v=20260620-2"></script>
</head>
<body>
<div id="xeBoot">Cargando XelerIA…</div>
<iframe id="xeFrame" src="./admin_erp.html?reset=1"></iframe>
<script>
(function(){
  const boot=document.getElementById('xeBoot');
  const frame=document.getElementById('xeFrame');
  function syncTenant(){
    try{
      const u=new URL(location.href);
      const tenant=u.searchParams.get('tenant_id')||u.searchParams.get('tenant')||localStorage.getItem('xeleria_tenant_id')||'00000000-0000-0000-0000-000000000001';
      localStorage.setItem('xeleria_tenant_id',tenant);
      const inner=new URL(frame.getAttribute('src'),location.href);
      inner.searchParams.set('tenant_id',tenant);
      frame.src=inner.pathname+inner.search;
    }catch(e){}
  }
  syncTenant();
  frame.addEventListener('load',function(){
    try{
      if(window.XeleriaRuntimePatch) window.XeleriaRuntimePatch.patchIframe(frame);
      boot.textContent='XelerIA listo';
      setTimeout(()=>boot.style.display='none',900);
    }catch(e){boot.textContent='No pude aplicar capa XelerIA';console.error(e)}
  });
})();
</script>
</body>
</html>
