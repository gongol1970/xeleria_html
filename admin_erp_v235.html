<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>XelerIA · Backoffice 2.35 prueba</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f2f0eb;font-family:Inter,Arial,sans-serif}
#xeleriaFrame{border:0;width:100vw;height:100vh;display:block}
#patchBanner{position:fixed;right:12px;bottom:12px;z-index:999999;background:#101010;color:#fff;border:1px solid #dcc58f;border-radius:12px;padding:7px 10px;font-size:12px;box-shadow:0 8px 26px rgba(0,0,0,.25);opacity:.86}
</style>
</head>
<body>
<iframe id="xeleriaFrame" src="admin_erp.html"></iframe>
<div id="patchBanner">XelerIA 2.35 UI patch · prueba</div>
<script>
(function(){
  const frame=document.getElementById('xeleriaFrame');
  function injectScript(doc,src){
    return new Promise((resolve,reject)=>{
      const s=doc.createElement('script');
      s.src=src+(src.includes('?')?'&':'?')+'v='+Date.now();
      s.onload=resolve;
      s.onerror=reject;
      doc.body.appendChild(s);
    });
  }
  frame.addEventListener('load',async()=>{
    try{
      const doc=frame.contentDocument||frame.contentWindow.document;
      await injectScript(doc,'admin_erp_v235_actions_patch.js');
      await injectScript(doc,'admin_erp_v235_combos_patch.js');
      console.info('XelerIA 2.35 patches injected');
    }catch(e){
      console.error('No pude inyectar parches XelerIA 2.35',e);
      const b=document.getElementById('patchBanner');
      if(b)b.textContent='Error cargando patch 2.35';
    }
  });
})();
</script>
</body>
</html>
