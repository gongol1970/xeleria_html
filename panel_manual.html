<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>XelerIA Manual</title><style>body{font-family:Arial;background:#0b1220;color:#eef4ff;padding:24px}input,button{padding:10px;margin:4px;border-radius:8px;background:#111c30;color:#eef4ff;border:1px solid #334}.card{background:#121a2b;border:1px solid #26344f;border-radius:14px;padding:16px;margin:14px 0}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #26344f;padding:8px;text-align:left}pre{white-space:pre-wrap}</style></head><body><h1>XelerIA manual</h1><div class="card"><input id="api" value="https://api.xeleria.com.ar" size="32"><input id="tenant" value="fbfa89c2-b377-49b3-9d18-d7d313c01db1" size="40"><button onclick="loadAll()">Actualizar</button></div><div class="card"><h3>Producto</h3><input id="sku" placeholder="SKU"><input id="name" placeholder="Producto"><input id="stock" type="number" value="1"><button onclick="saveProduct()">Guardar</button></div><div class="card"><h3>Venta</h3><input id="saleSku" placeholder="SKU"><input id="qty" type="number" value="1"><input id="price" type="number" placeholder="Precio"><button onclick="sale()">Vender</button></div><div class="card"><h3>Stock</h3><table><thead><tr><th>SKU</th><th>Producto</th><th>Stock</th></tr></thead><tbody id="rows"></tbody></table></div><div class="card"><pre id="out">—</pre></div><script>function c(){return{api:api.value.replace(/\/$/,''),tenant:tenant.value.trim()}}function show(x){out.textContent=typeof x==='string'?x:JSON.stringify(x,null,2)}async function rq(path,method,body){let k=c();let o={method:method||'GET'};if(body){o.headers={'Content-Type':'application/json'};o.body=JSON.stringify(body)}let r=await fetch(k.api+path,o);let t=await r.text();let d;try{d=JSON.parse(t)}catch(e){d={body:t}}d.status=r.status;d.ok_http=r.ok;show(d);return d}async function loadAll(){let k=c();let d=await rq('/api/stock-view/'+k.tenant,'GET');rows.innerHTML=(d.items||[]).map(i=>'<tr><td>'+i.sku+'</td><td>'+i.name+'</td><td>'+i.stock+'</td></tr>').join('')||'<tr><td colspan=3>Sin datos</td></tr>'}async function saveProduct(){let k=c();let s=sku.value.trim(),n=name.value.trim();if(!s||!n){show('Falta SKU o producto');return}let b={sku:s,name:n,stock:Number(stock.value||0),item_type:'simple',active:true};let d=await rq('/api/inventory/'+k.tenant,'POST',b);if(d.status===409)d=await rq('/api/inventory/'+k.tenant+'/'+encodeURIComponent(s),'PATCH',b);if(d.ok_http){sku.value='';name.value='';stock.value='1'}await loadAll()}async function sale(){let k=c();let s=saleSku.value.trim();if(!s){show('Falta SKU');return}let b={channel:'LOCAL',lines:[{sku:s,quantity:Number(qty.value||1),unit_price:price.value?Number(price.value):null}]};let d=await rq('/api/sales/'+k.tenant+'/register','POST',b);if(d.ok_http){saleSku.value='';qty.value='1';price.value=''}await loadAll()}loadAll()</script></body></html>
